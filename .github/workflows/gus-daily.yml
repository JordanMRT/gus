name: GUS — Ticket quotidien
on:
  workflow_dispatch:
jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          echo "PUPPETEER_EXECUTABLE_PATH=$(which google-chrome-stable)" >> $GITHUB_ENV
      - name: Générer et envoyer le ticket GUS
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: node send.js
      - name: Archiver le ticket dans le repo
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p archive
          cp output/ticket.png archive/${DATE}.png
          git config user.name "GUS Bot"
          git config user.email "gus@noreply.github.com"
          git add archive/${DATE}.png
          git diff --staged --quiet || git commit -m "GUS ticket ${DATE}"
          git push
      - name: Conserver le ticket comme artefact Actions
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ticket-gus-${{ github.run_number }}
          path: output/ticket.png
          retention-days: 30
