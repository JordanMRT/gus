<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Arboretum Musical</title>
    <!-- Scripts Externes -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.12.16/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --serre-glass: rgba(255, 255, 255, 0.15);
            --leaf-green: #2D5A27;
            --soft-moss: #A8C69F;
            --petal-pink: #F3D1D1;
            --sky-haze: #E0F2F1;
            --bark-brown: #4A3728;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            color: var(--bark-brown);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Arrière-plan de serre */
        .greenhouse-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(45, 90, 39, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(168, 198, 159, 0.2) 0%, transparent 30%);
        }

        /* Insectes */
        .insect {
            position: fixed;
            width: 8px;
            height: 8px;
            background: rgba(0,0,0,0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
        }

        .ladybug {
            background: #e74c3c;
            width: 6px;
            height: 6px;
            box-shadow: 0 0 5px rgba(231, 76, 60, 0.5);
        }

        /* Layout */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--leaf-green);
            margin: 0;
        }

        .glass-card {
            background: var(--serre-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(45, 90, 39, 0.1);
            margin-bottom: 40px;
        }

        /* Navigation Catégories */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .tab-btn {
            padding: 12px 25px;
            border: none;
            background: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            color: var(--leaf-green);
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .tab-btn.active {
            background: var(--leaf-green);
            color: white;
        }

        /* Liste de Musique */
        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .music-item {
            padding: 20px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.2s ease;
        }

        .music-item:hover {
            transform: translateY(-5px) rotate(1deg);
        }

        .album-art {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: var(--soft-moss);
            object-fit: cover;
        }

        .info h4 { margin: 0; font-size: 1.1rem; }
        .info p { margin: 5px 0 0; font-size: 0.85rem; opacity: 0.7; }

        /* Scrollbar Naturelle */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: var(--soft-moss); border-radius: 10px; }

    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- Composant Insecte ---
        const Insect = ({ delay }) => {
            const [coords, setCoords] = useState({ x: 0, y: 0 });
            
            useEffect(() => {
                const move = () => {
                    setCoords({
                        x: Math.random() * window.innerWidth,
                        y: Math.random() * window.innerHeight
                    });
                };
                const interval = setInterval(move, 3000 + Math.random() * 2000);
                move();
                return () => clearInterval(interval);
            }, []);

            return (
                <motion.div 
                    className="insect ladybug"
                    animate={{ x: coords.x, y: coords.y }}
                    transition={{ duration: 4, ease: "easeInOut" }}
                    style={{ left: 0, top: 0 }}
                />
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('genres');
            const [data, setData] = useState({ genres: [], tracks: [], artists: [] });
            const [loading, setLoading] = useState(true);

            // Simulation API Spotify (Pour la démo car nécessite Auth Token dynamique normalement)
            // Dans un vrai projet, on ferait le flow client_credentials ici
            useEffect(() => {
                setTimeout(() => {
                    setData({
                        genres: ["Lofi Forest", "Deep Jungle", "Rainy Jazz", "Natural Ambient"],
                        artists: [
                            { name: "Nature Boy", img: "https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?w=100" },
                            { name: "Green Tea", img: "https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=100" }
                        ],
                        tracks: [
                            { title: "Morning Dew", artist: "Organic Sound", img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=100" },
                            { title: "Photosynthesis", artist: "The Leaves", img: "https://images.unsplash.com/photo-1501004318641-729e999a9405?w=100" },
                            { title: "Wind Whispers", artist: "Aero", img: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=100" }
                        ]
                    });
                    setLoading(false);
                }, 1500);
            }, []);

            return (
                <div className="container">
                    <div className="greenhouse-bg" />
                    
                    {/* Nos petits résidents */}
                    <Insect />
                    <Insect />
                    <Insect />

                    <header>
                        <motion.div
                            initial={{ opacity: 0, y: -20 }}
                            animate={{ opacity: 1, y: 0 }}
                        >
                            <h1>L'Arboretum</h1>
                            <p style={{fontStyle: 'italic', color: '#6b8e23'}}>Cultivez votre bibliothèque musicale</p>
                        </motion.div>
                    </header>

                    <nav className="nav-tabs">
                        {['genres', 'artistes', 'morceaux'].map(tab => (
                            <button 
                                key={tab}
                                className={`tab-btn ${activeTab === tab ? 'active' : ''}`}
                                onClick={() => setActiveTab(tab)}
                            >
                                {tab.charAt(0).toUpperCase() + tab.slice(1)}
                            </button>
                        ))}
                    </nav>

                    <main className="glass-card">
                        <AnimatePresence mode="wait">
                            <motion.div
                                key={activeTab}
                                initial={{ opacity: 0, x: 10 }}
                                animate={{ opacity: 1, x: 0 }}
                                exit={{ opacity: 0, x: -10 }}
                                transition={{ duration: 0.3 }}
                                className="music-grid"
                            >
                                {activeTab === 'genres' && data.genres.map(g => (
                                    <div key={g} className="music-item">
                                        <div className="album-art" style={{display:'flex', alignItems:'center', justifyContent:'center', fontSize:'1.5rem'}}>🌿</div>
                                        <div className="info"><h4>{g}</h4><p>Exploration botanique</p></div>
                                    </div>
                                ))}

                                {activeTab === 'artistes' && data.artists.map(a => (
                                    <div key={a.name} className="music-item">
                                        <img src={a.img} className="album-art" alt={a.name} />
                                        <div className="info"><h4>{a.name}</h4><p>Botaniste Sonore</p></div>
                                    </div>
                                ))}

                                {activeTab === 'morceaux' && data.tracks.map(t => (
                                    <div key={t.title} className="music-item">
                                        <img src={t.img} className="album-art" alt={t.title} />
                                        <div className="info"><h4>{t.title}</h4><p>{t.artist}</p></div>
                                    </div>
                                ))}
                            </motion.div>
                        </AnimatePresence>
                    </main>

                    <footer style={{textAlign: 'center', fontSize: '0.8rem', opacity: 0.6, marginTop: '50px'}}>
                        <p>ID Client Spotify : 7121f5d7c3dc... | Connecté à la racine</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
